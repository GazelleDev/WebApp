name: Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify application
        run: npm run verify

  publish-image:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image name
        id: image
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  migrate-production:
    if: >-
      github.ref == 'refs/heads/main' &&
      secrets.PRODUCTION_DATABASE_URL != '' &&
      secrets.PRODUCTION_ADMIN_EMAIL != '' &&
      secrets.PRODUCTION_ADMIN_PASSWORD != '' &&
      secrets.PRODUCTION_SESSION_SECRET != ''
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply production schema
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: npm run db:push

      - name: Seed owner account and content
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          ADMIN_EMAIL: ${{ secrets.PRODUCTION_ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.PRODUCTION_ADMIN_PASSWORD }}
          SESSION_SECRET: ${{ secrets.PRODUCTION_SESSION_SECRET }}
        run: npm run admin:seed

  deploy:
    if: >-
      always() &&
      github.ref == 'refs/heads/main' &&
      secrets.PRODUCTION_DEPLOY_WEBHOOK_URL != '' &&
      needs.publish-image.result == 'success' &&
      (needs.migrate-production.result == 'success' || needs.migrate-production.result == 'skipped')
    needs:
      - publish-image
      - migrate-production
    runs-on: ubuntu-latest

    steps:
      - name: Trigger production deploy hook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.PRODUCTION_DEPLOY_WEBHOOK_URL }}
        run: curl --fail --silent --show-error --request POST "$DEPLOY_WEBHOOK_URL"
